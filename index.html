<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF Fandom Ranking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Comifuro Fandom Ranking</h1>
        </header>

        <div class="dataset-toggle">
            <button id="btn-cf22" class="toggle-btn active">CF22</button>
            <button id="btn-cf21" class="toggle-btn">CF21</button>
        </div>

        <section id="stats" class="stats-panel">
            <div class="stat-card">
                <h3>Total Fandoms</h3>
                <p id="total-fandoms">-</p>
            </div>
            <div class="stat-card">
                <h3>Total Creators</h3>
                <p id="total-creators">-</p>
            </div>
        </section>

        <section id="rankings">
            <div class="rankings-header">
                <h2>All Rankings</h2>
                <input type="text" id="search-bar" placeholder="Search fandoms...">
                <div id="filter-bar" class="filter-bar">
                    <button class="filter-btn filter-all active" data-filter="all">All</button>
                    <button class="filter-btn filter-new" data-filter="new">New</button>
                    <button class="filter-btn filter-up" data-filter="up">Rising</button>
                    <button class="filter-btn filter-down" data-filter="down">Falling</button>
                </div>
            </div>
            <div class="list-header">
                <span class="delta-col"></span>
                <span class="rank-col">Rank</span>
                <span class="name-col">Fandom Name</span>
                <span class="count-col">Creators</span>
            </div>
            <ul id="ranking-list" class="ranking-list">
                <!-- Items will be populated by JS -->
                <li class="loading">Loading data...</li>
            </ul>
        </section>

        <footer>
            <p id="footer-source">Data sourced from Comifuro 22 Creator List</p>
            <p>Similar fandom names are <a href="https://github.com/mentegago/cf22-map-config-data/blob/master/data/fandom-groups.json" target="_blank">normalized and merged</a></p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
